<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enterprise Support Copilot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 40px 20px;
      color: #1f2937;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #4b5563;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 14px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .loading {
      margin-top: 16px;
      color: #2563eb;
      font-weight: bold;
      display: none;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
      display: none;
    }

    .label {
      font-weight: bold;
      margin-top: 14px;
      display: block;
    }

    ul {
      padding-left: 20px;
    }

    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-top: 8px;
    }

    .error {
      margin-top: 16px;
      color: #b91c1c;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Enterprise Support Copilot</h1>
    <p>Ask a support question and see the answer, next steps, confidence, and source.</p>

    <textarea id="questionInput" placeholder="Example: How do I log in?"></textarea>
    <br />
    <button id="askButton">Ask Support Copilot</button>

    <div id="loading" class="loading">Loading answer...</div>
    <div id="error" class="error"></div>

    <div id="result" class="result">
      <span class="label">Answer</span>
      <div id="answerText"></div>

      <span class="label">Next Steps</span>
      <ul id="nextStepsList"></ul>

      <div class="meta"><strong>Confidence:</strong> <span id="confidenceText"></span></div>
      <div class="meta"><strong>Primary Source:</strong> <span id="sourceText"></span></div>
    </div>
  </div>

  <script>
    const questionInput = document.getElementById("questionInput");
    const askButton = document.getElementById("askButton");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("error");
    const resultBox = document.getElementById("result");
    const answerText = document.getElementById("answerText");
    const nextStepsList = document.getElementById("nextStepsList");
    const confidenceText = document.getElementById("confidenceText");
    const sourceText = document.getElementById("sourceText");

    askButton.addEventListener("click", async () => {
      const question = questionInput.value.trim();

      if (!question) {
        errorBox.style.display = "block";
        errorBox.textContent = "Please enter a question.";
        resultBox.style.display = "none";
        return;
      }

      errorBox.style.display = "none";
      resultBox.style.display = "none";
      loading.style.display = "block";
      askButton.disabled = true;

      try {
        const response = await fetch("https://entsupportcopilot-app.blackhill-4304f90e.eastus.azurecontainerapps.io/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            question,
            top: 3
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Request failed: ${response.status} ${errorText}`);
        }

        const data = await response.json();
        console.log("API data:", data);
        const result = data.response;
        console.log("Response payload:", result);

        answerText.textContent = result.answer || "No answer returned.";

        nextStepsList.innerHTML = "";
        (result.next_steps || []).forEach(step => {
          const li = document.createElement("li");
          li.textContent = step;
          nextStepsList.appendChild(li);
        });

        confidenceText.textContent = result.confidence || "unknown";
        sourceText.textContent = result.primary_source || "None";
        console.log("About to show result box");
        resultBox.style.display = "block";
      } catch (error) {
        errorBox.style.display = "block";
        errorBox.textContent = error.message;
      } finally {
        loading.style.display = "none";
        askButton.disabled = false;
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      }
    });
  </script>
</body>
</html>
